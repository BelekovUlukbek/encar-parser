{% extends "base.html" %}

{% block title %}Вход - Auto Korea{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto;">
    <div style="background: white; border-radius: var(--border-radius); padding: 40px; border: 1px solid var(--border-gray);">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-sign-in-alt fa-3x" style="color: var(--primary-blue);"></i>
            <h2 style="margin-top: 15px;">Вход в аккаунт</h2>
        </div>

        <form method="POST" action="/login">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--dark-text);">
                    <i class="fas fa-user"></i> Имя пользователя
                </label>
                <input type="text" name="username" required
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--dark-text);">
                    <i class="fas fa-lock"></i> Пароль
                </label>
                <input type="password" name="password" required
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="remember">
                    <span>Запомнить меня</span>
                </label>
            </div>

            <button type="submit" style="width: 100%; padding: 14px; background: var(--primary-blue); color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>

            <div style="text-align: center; margin-top: 20px;">
                <p>Нет аккаунта? <a href="/register" style="color: var(--primary-blue);">Зарегистрироваться</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
