{% extends "base.html" %}

{% block title %}Регистрация - Auto Korea{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 40px auto;">
    <div style="background: white; border-radius: var(--border-radius); padding: 40px; border: 1px solid var(--border-gray);">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-user-plus fa-3x" style="color: var(--primary-blue);"></i>
            <h2 style="margin-top: 15px;">Регистрация</h2>
        </div>

        <form method="POST" action="/register">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--dark-text);">
                    <i class="fas fa-user"></i> Имя пользователя
                </label>
                <input type="text" name="username" required
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--dark-text);">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" name="email" required
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--dark-text);">
                    <i class="fas fa-lock"></i> Пароль
                </label>
                <input type="password" name="password" required
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--dark-text);">
                    <i class="fas fa-lock"></i> Подтверждение
                </label>
                <input type="password" name="confirm_password" required
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 5px;">
            </div>

            <button type="submit" style="width: 100%; padding: 14px; background: var(--primary-blue); color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>

            <div style="text-align: center; margin-top: 20px;">
                <p>Уже есть аккаунт? <a href="/login" style="color: var(--primary-blue);">Войти</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
